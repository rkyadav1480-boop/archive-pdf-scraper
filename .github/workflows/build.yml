name: Build APK

on:
push:
branches: [ main ]

jobs:
build:
runs-on: ubuntu-latest

steps:
- name: 📥 Checkout Code
  uses: actions/checkout@v3

- name: ⚙️ Setup Flutter
  uses: subosito/flutter-action@v2
  with:
    flutter-version: '3.22.0'

- name: 🔍 Flutter Doctor
  run: flutter doctor

- name: 🧹 Flutter Clean
  run: flutter clean

- name: 📦 Get Dependencies
  run: flutter pub get

- name: 🔧 Clean Gradle
  run: |
    cd android
    ./gradlew clean

- name: 🏗️ Build APK
  run: flutter build apk --release

- name: 📤 Upload APK
  uses: actions/upload-artifact@v3
  with:
    name: app-release
    path: build/app/outputs/flutter-apk/app-release.apk