name: Build Archive PDF Scraper APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Manual trigger bhi allowed hai

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Code checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java setup (Flutter needs Java 17) ─────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Flutter setup ──────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      # ── 4. Dependencies install ───────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 5. Code analysis (optional but good) ──────────────────
      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 6. Build APK ──────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release --no-shrink

      # ── 7. Upload APK as artifact ─────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Archive-PDF-Scraper-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 8. Show APK size ──────────────────────────────────────
      - name: Show APK info
        run: |
          echo "✅ APK build successful!"
          ls -lh build/app/outputs/flutter-apk/app-release.apk
          echo "📦 APK size: $(du -sh build/app/outputs/flutter-apk/app-release.apk | cut -f1)"
